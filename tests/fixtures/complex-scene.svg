<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 400 300" width="400" height="300">
  <!-- A more complex SVG scene exercising many optimization paths:
       gradients, transforms, paths, styles, groups, text, use elements. -->
  <defs>
    <linearGradient id="skyGrad">
      <stop offset="0" stop-color="#87CEEB"/>
      <stop offset="1" stop-color="#4682B4"/>
    </linearGradient>
    <linearGradient id="grassGrad">
      <stop offset="0" stop-color="#228B22"/>
      <stop offset="1" stop-color="#32CD32"/>
    </linearGradient>
    <circle id="cloud-dot" cx="0" cy="0" r="20" fill="white"/>
  </defs>

  <!-- Sky -->
  <rect width="400" height="200" fill="url(#skyGrad)"/>

  <!-- Ground -->
  <rect y="200" width="400" height="100" fill="url(#grassGrad)"/>

  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="#FFD700" style="opacity:0.900000"/>

  <!-- Cloud (using <use>) -->
  <g transform="translate(80,60)">
    <use xlink:href="#cloud-dot" x="0" y="0"/>
    <use xlink:href="#cloud-dot" x="25" y="-10"/>
    <use xlink:href="#cloud-dot" x="50" y="0"/>
  </g>

  <!-- House -->
  <g transform="translate(150,140)">
    <rect width="100" height="80" fill="#8B4513" stroke="#000000" stroke-width="2.000"/>
    <polygon points="0,0 50,-40 100,0" fill="#A0522D" stroke="#000000" stroke-width="1.500"/>
    <rect x="40" y="40" width="20" height="40" fill="#654321"/>
    <rect x="10" y="15" width="25" height="20" fill="#87CEEB" stroke="#333333" stroke-width="1.000"/>
    <rect x="65" y="15" width="25" height="20" fill="#87CEEB" stroke="#333333" stroke-width="1.000"/>
  </g>

  <!-- Tree -->
  <g transform="translate(50,120)">
    <rect x="10" y="60" width="10" height="40" fill="#8B4513"/>
    <path d="M15,60 l-20,0,10,-30,10,0,-20,0,10,-30,10,0" fill="#228B22"/>
  </g>

  <!-- Path with mixed line segments -->
  <path d="M300,250 h20 l10,10,0,-20,15,0" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Text -->
  <text x="200" y="290" text-anchor="middle" font-size="12.000px"
        style="fill:#333333;font-family:sans-serif">A cozy scene</text>
</svg>
