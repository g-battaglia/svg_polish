<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
 <!-- A more complex SVG scene exercising many optimization paths:
       gradients, transforms, paths, styles, groups, text, use elements. -->
 <defs>
  <linearGradient id="skyGrad">
   <stop stop-color="#87CEEB" offset="0"/>
   <stop stop-color="#4682B4" offset="1"/>
  </linearGradient>
  <linearGradient id="grassGrad">
   <stop stop-color="#228B22" offset="0"/>
   <stop stop-color="#32CD32" offset="1"/>
  </linearGradient>
  <circle id="cloud-dot" r="20" fill="#fff"/>
 </defs>
 <!-- Sky -->
 <rect width="400" height="200" fill="url(#skyGrad)"/>
 <!-- Ground -->
 <rect y="200" width="400" height="100" fill="url(#grassGrad)"/>
 <!-- Sun -->
 <circle cx="350" cy="50" r="30" fill="#FFD700" opacity=".9"/>
 <!-- Cloud (using <use>) -->
 <g transform="translate(80,60)">
  <use xlink:href="#cloud-dot"/>
  <use x="25" y="-10" xlink:href="#cloud-dot"/>
  <use x="50" xlink:href="#cloud-dot"/>
 </g>
 <!-- House -->
 <g transform="translate(150,140)">
  <rect width="100" height="80" fill="#8B4513" stroke="#000" stroke-width="2"/>
  <polygon points="0 0 50 -40 100 0" fill="#A0522D" stroke="#000" stroke-width="1.5"/>
  <rect x="40" y="40" width="20" height="40" fill="#654321"/>
  <rect x="10" y="15" width="25" height="20" fill="#87CEEB" stroke="#333"/>
  <rect x="65" y="15" width="25" height="20" fill="#87CEEB" stroke="#333"/>
 </g>
 <!-- Tree -->
 <g transform="translate(50,120)">
  <rect x="10" y="60" width="10" height="40" fill="#8B4513"/>
  <path d="m15 60h-20l10-30h10-20l10-30h10" fill="#228B22"/>
 </g>
 <!-- Path with mixed line segments -->
 <path d="m300 250h20l10 10v-20h15" fill="none" stroke="#333" stroke-width="1.5"/>
 <!-- Text -->
 <text x="200" y="290" fill="#333333" font-family="sans-serif" font-size="12px" text-anchor="middle">A cozy scene</text>
</svg>
