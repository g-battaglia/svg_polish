<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <!-- Colors in style attributes that can be shortened.
       svg_polish should convert #ff0000 -> red or #f00, etc. -->
  <rect x="10" y="10" width="50" height="80" style="fill:#ff0000;stroke:#000000"/>
  <circle cx="120" cy="50" r="30" style="fill:#00ff00;stroke:#0000ff"/>
  <ellipse cx="180" cy="50" rx="15" ry="25" style="fill:rgb(255,128,0)"/>
</svg>
